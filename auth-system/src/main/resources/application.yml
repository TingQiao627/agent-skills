spring:
  application:
    name: auth-system
  datasource:
    url: jdbc:mysql://localhost:3306/auth_db?useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  redis:
    host: localhost
    port: 6379

jwt:
  access-token:
    secret: your-access-token-secret-key-min-256-bits
    expiration: 7200000  # 2小时
  refresh-token:
    secret: your-refresh-token-secret-key-min-256-bits
    expiration: 2592000000  # 30天

security:
  login:
    max-attempts: 5
    lock-duration: 900000  # 15分钟
  sms:
    code-expiration: 300000  # 5分钟
    daily-limit: 10